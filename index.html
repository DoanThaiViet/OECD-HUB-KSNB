<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OECD Governance Command Center · PVEP</title>
<meta name="theme-color" content="#046B39">
<link rel="icon" href="assets/pvep-logo.png">
<link rel="stylesheet" href="command.css">
<style>
/* ================= HUB — CINEMATIC EXECUTIVE LIGHT ================= */
.ksnb-badge{display:none !important}          /* hub: không ghi badge */
/* nền motion ảnh 3 giai đoạn (như Bản toàn trang) + màn sáng */
.cinema{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.cinema img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.6s ease;transform:scale(1.04)}
.cinema img.on{opacity:1}
@media (prefers-reduced-motion: no-preference){
  .cinema img.on{animation:kburns 11s ease-out forwards}
  @keyframes kburns{from{transform:scale(1.04)}to{transform:scale(1.13)}}
}
.veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(251,253,255,.90) 0%,rgba(240,246,251,.82) 30%,rgba(236,246,240,.78) 62%,rgba(247,250,253,.9) 100%)}
.dotveil{position:absolute;inset:0;background-image:radial-gradient(rgba(15,37,64,.06) 1.1px, transparent 1.1px);background-size:26px 26px}
body::before{display:none}                     /* dùng cinema thay glow mặc định */

.hubwrap{position:relative;z-index:1;min-height:calc(100svh - 62px);display:flex;flex-direction:column}
.hubhead{text-align:center;padding:20px 20px 2px}
.hubhead .eyebrow{font-size:12.5px;font-weight:800;letter-spacing:3.5px;text-transform:uppercase;color:var(--pvep-deep)}
.hubhead h1{font-family:var(--ff-head);font-size:clamp(30px,3.6vw,50px);font-weight:800;color:var(--ink);margin-top:8px;letter-spacing:-.5px}
.hubhead h1 em{font-style:normal;background:linear-gradient(100deg,#046B39,#00A651);-webkit-background-clip:text;background-clip:text;color:transparent}
.loopline{display:flex;justify-content:center;gap:8px;align-items:center;margin-top:12px;font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);flex-wrap:wrap}
.loopline i{font-style:normal;color:var(--pvep)}

/* ---------- sân khấu chòm sao ---------- */
.stage{position:relative;flex:1;min-height:470px;overflow:hidden}
/* canvas thiết kế cố định, scale vừa stage — node không bao giờ đè tiêu đề/lõi */
.stagefit{position:absolute;left:50%;top:50%;width:1440px;height:660px;transform:translate(-50%,-50%) scale(var(--k,1))}
.stagefit svg.links{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.stage svg.links path.link{fill:none;stroke:url(#lg);stroke-width:1.8;stroke-dasharray:6 8;animation:dashmove 10s linear infinite;opacity:.75}
@keyframes dashmove{to{stroke-dashoffset:-140}}
.stage svg.links circle.spark{fill:#00A651;filter:drop-shadow(0 0 5px rgba(0,166,81,.8))}
@media (prefers-reduced-motion: reduce){.stage svg.links path.link{animation:none}.stage svg.links circle.spark{display:none}}
/* lõi trung tâm */
.core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:250px;height:250px;display:flex;align-items:center;justify-content:center;text-align:center;z-index:3}
.core .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(0,166,81,.45);animation:corepulse 4.5s ease-in-out infinite}
.core .ring.r2{inset:-26px;border-color:rgba(0,166,81,.25);animation-delay:1.4s}
.core .ring.r3{inset:-54px;border-color:rgba(0,166,81,.12);animation-delay:2.8s}
@keyframes corepulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.05);opacity:.45}}
@media (prefers-reduced-motion: reduce){.core .ring{animation:none}}
.core .inner{width:210px;height:210px;border-radius:50%;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border:2.5px solid var(--pvep);box-shadow:0 0 0 12px rgba(0,166,81,.07),0 24px 60px rgba(4,107,57,.22);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:20px}
.core img{height:46px}
.core .cv{font-family:var(--ff-head);font-size:36px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-1px}
.core .cv small{font-size:19px;color:var(--pvep-deep)}
.core .cl{font-size:10.5px;font-weight:800;letter-spacing:2.2px;text-transform:uppercase;color:var(--pvep-deep)}
.core .cl.sub{color:var(--faint);letter-spacing:1.2px;font-size:9px}
/* node phân hệ */
.node{position:absolute;width:362px;transform:translate(-50%,-50%);z-index:2;text-decoration:none;display:block}
.node .box{background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border:1px solid var(--line);border-top:4px solid var(--ac);border-radius:18px;padding:17px 19px 15px;box-shadow:var(--shadow-card);transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 62px;gap:6px 12px}
.node .box::after{content:"";position:absolute;inset:0;background:radial-gradient(220px 110px at 88% -25%,color-mix(in srgb,var(--ac) 14%,transparent),transparent 70%);pointer-events:none}
a.node:hover .box{transform:translateY(-6px) scale(1.015);border-color:var(--ac);box-shadow:var(--shadow-hover)}
a.node:hover{text-decoration:none}
.node .ph{grid-column:1/3;font-size:11px;font-weight:800;letter-spacing:1.8px;color:var(--ac);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.node .ph .tier{margin-left:auto;font-size:8.5px;letter-spacing:1px;padding:2.5px 9px;border-radius:9px;background:#F2F6FA;border:1px solid var(--line);color:var(--faint)}
.node .nm{grid-column:1;font-family:var(--ff-head);font-size:17.5px;font-weight:800;color:var(--ink);line-height:1.28}
.node .ndonut{grid-column:2;grid-row:2/4;align-self:center;justify-self:end}
.node .ndonut svg{width:62px;height:62px;display:block}
.node .ndonut .nb{fill:none;stroke:#E7EDE9;stroke-width:6.5}
.node .ndonut .nv{fill:none;stroke:var(--ac);stroke-width:6.5;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%}
.node .ndonut text{font-family:var(--ff-head);font-size:14px;font-weight:800;fill:var(--ink)}
.node .ndonut .u{font-size:7.5px;fill:var(--faint);font-weight:700;letter-spacing:.5px}
.node .kv{grid-column:1;font-size:12.5px;color:var(--muted);line-height:1.5}
.node .kv b{color:var(--ink)}
.node .go{grid-column:1/3;margin-top:5px;font-size:12px;font-weight:800;color:var(--ac)}
.node .go::after{content:" →"}
.node .go.off{color:var(--faint);font-weight:700}
/* money row */
.moneyrow{position:relative;z-index:2;display:flex;justify-content:center;gap:14px;flex-wrap:wrap;padding:4px 20px 18px}
.mr{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:15px;padding:11px 28px;text-align:center;min-width:158px;box-shadow:var(--shadow-card)}
.mr .v{font-family:var(--ff-head);font-size:31px;font-weight:800;color:var(--ink);line-height:1.05;letter-spacing:-.5px}
.mr .v.red{color:var(--red)}.mr .v.amber{color:var(--amber)}.mr .v.gold{color:var(--amber)}.mr .v.ok{color:var(--pvep-deep)}
.mr .l{font-size:10px;font-weight:800;letter-spacing:1.1px;text-transform:uppercase;color:var(--faint);margin-top:5px}
/* ---------- vòng dọc: mobile + chế độ Danh sách ---------- */
.menulist{position:relative;z-index:2;max-width:520px;margin:0 auto;padding:0 20px 26px;width:100%}
.menulist h2{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--faint);text-align:center;margin-bottom:14px}
/* lõi điểm ACGS dạng thẻ ngang */
.mcore{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border:2px solid var(--pvep);border-radius:18px;padding:14px 18px;box-shadow:0 0 0 7px rgba(0,166,81,.07),var(--shadow-card)}
.mcore img{height:44px;flex:none}
.mcore .mv{font-family:var(--ff-head);font-size:34px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-1px}
.mcore .mv small{font-size:16px;color:var(--pvep-deep)}
.mcore .ml{font-size:10px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:var(--pvep-deep);margin-top:4px}
.mcore .mu{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin-top:2px}
/* node ở dạng xếp dọc — dùng lại đúng thẻ của chòm sao */
.node.mob{position:static;transform:none;width:100%;margin:0 auto}
a.node.mob:hover .box{transform:none}
/* nối giữa các thẻ */
.conn{height:26px;position:relative}
.conn::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;transform:translateX(-50%);background:linear-gradient(180deg,rgba(0,166,81,.55),rgba(0,166,81,.18))}
.conn::after{content:"▾";position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);color:var(--pvep);font-size:11px;line-height:1}
.conn.loop::before{background:repeating-linear-gradient(180deg,rgba(0,166,81,.45) 0 4px,transparent 4px 8px)}
.conn.loop::after{content:"↻ khép vòng về Kiến thức";position:static;display:block;text-align:center;padding-top:26px;font-size:10px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--pvep-deep);transform:none}
.conn.loop{height:auto}
@media(max-width:980px){
  .stage{display:none}
  .moneyrow{padding-top:16px}
  #togglelist{display:none}          /* dưới 980px không có chòm sao để chuyển */
  .hubhead h1{font-size:clamp(24px,7vw,34px)}
  .loopline{font-size:10.5px;gap:5px}
  .mr{padding:10px 18px;min-width:calc(50% - 7px);flex:1}
  .mr .v{font-size:26px}
}
@media(min-width:981px){ .menulist{display:none} body.showlist .menulist{display:block} body.showlist .stage{display:none} }
@media print{
  .stage,.cinema,.moneyrow{display:none !important}
  .menulist{display:block !important;max-width:none}
  .conn{height:14px}
  .node.mob{break-inside:avoid}
}
</style>
</head>
<body data-page="hub">

<div class="cbar">
  <a class="logolink" href="index.html"><img class="logo" src="assets/pvep-logo.png" alt="PVEP"></a>
  <div class="who"><small>Tổng công ty Thăm dò Khai thác Dầu khí · Ban KSNB</small><b>OECD Governance Command Center</b></div>
  <div class="sp">
    <button class="cbtn noprint" id="togglelist" title="Chuyển giữa chòm sao và danh sách">☰ Danh sách</button>
    <a class="cbtn" href="portal.html" title="Bản toàn trang (đọc liền mạch / in A4)">⤢ Bản toàn trang</a>
  </div>
</div>

<!-- nền cinematic 3 giai đoạn -->
<div class="cinema" aria-hidden="true">
  <img class="on" src="assets/hero-oil.webp" alt="">
  <img src="assets/hero-wind.webp" alt="">
  <img src="assets/hero-subsea.webp" alt="">
  <div class="veil"></div>
  <div class="dotveil"></div>
</div>

<div class="hubwrap">
  <div class="hubhead">
    <span class="eyebrow">Nền tảng quản trị số · Chương trình OECD tại PVEP</span>
    <h1>Vòng quản trị khép kín <em>5 phân hệ</em></h1>
    <div class="loopline"><b>Kiến thức</b> <i>→</i> <b>Thực thi</b> <i>→</i> <b>Theo dõi</b> <i>→</i> <b>Tài liệu – Báo cáo</b> <i>→</i> <b>Đánh giá</b> <i>↻</i></div>
  </div>

  <div class="stage" id="stage">
    <div class="stagefit" id="stagefit">
      <svg class="links" id="linksvg">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#046B39" stop-opacity=".55"/>
            <stop offset="1" stop-color="#00A651" stop-opacity=".3"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="core" aria-hidden="true">
        <span class="ring"></span><span class="ring r2"></span><span class="ring r3"></span>
        <div class="inner">
          <img src="assets/pvep-logo.png" alt="">
          <div class="cv" id="core-score">—<small>%</small></div>
          <div class="cl">ACGS 2026 · Hạng A</div>
          <div class="cl sub" id="core-updated"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="moneyrow" id="moneyrow"></div>

  <div class="menulist" id="menulist">
    <h2>Danh mục phân hệ</h2>
  </div>
</div>

<script src="data.js"></script>
<script src="shell.js"></script>
<script>
"use strict";
const D = window.OECD;
const st = D.stats();
const live = D.scoreLive();
const vn = n => String(n).replace(".", ",");

/* ------- 5 phân hệ — KPI + mini-donut tính từ data.js ------- */
const onTrack = Math.round((st.green + st.done) / st.total * 100);
const bcPct = Math.round(D.DIRECTIVES.filter(d=>d.reportedBy).length / D.DIRECTIVES.length * 100);
const NODES = [
 {ph:"PH1", nm:"OECD Knowledge Hub", tier:"PORTAL", ac:"#0E9F6E", href:"ph1-knowledge.html", verb:"Kiến thức",
  ring:{pct:100, txt:String(D.DOCS.original.length + D.DOCS.training.length), unit:"tài liệu"},
  kv:`<b>${D.DOCS.original.length + D.DOCS.training.length}</b> tài liệu chuẩn mực · <b>${D.DOCS.vbqlnb.length}</b> quy định nội bộ`},
 {ph:"PH2", nm:"Governance Execution Hub", tier:"COMMAND", ac:"#D97706", href:null, verb:"Thực thi",
  ring:{pct:st.avg, txt:vn(st.avg)+"%", unit:"tiến độ"},
  kv:`<b>${st.total}</b> nhiệm vụ KH 1017 · <b>63</b> đầu việc các Ban`},
 {ph:"PH3", nm:"Executive Dashboard", tier:"COMMAND", ac:"#2563EB", href:"ph3-dashboard.html", verb:"Theo dõi",
  ring:{pct:onTrack, txt:onTrack+"%", unit:"đúng hướng"},
  kv:`<b>${st.red}</b> quá hạn · <b>${st.amber}</b> nguy cơ · <b>${st.decide}</b> việc cần HĐTV quyết`},
 {ph:"PH4", nm:"Document & Reporting Center", tier:"PORTAL", ac:"#0D9488", href:"ph4-evidence.html", verb:"Tài liệu – Báo cáo",
  ring:{pct:bcPct, txt:String(D.DIRECTIVES.length), unit:"chỉ đạo"},
  kv:`<b>${D.DIRECTIVES.length}</b> văn bản 4 cấp · <b>${D.DIRECTIVES.filter(d=>d.reportedBy).length}</b> đã có báo cáo của PVEP`},
 {ph:"PH5", nm:"OECD Assessment Center", tier:"COMMAND", ac:"#7C3AED", href:"ph5-assessment.html", verb:"Đánh giá",
  ring:{pct:D.ROUNDS[0].self.pct, txt:vn(D.ROUNDS[0].self.pct)+"%", unit:"tự đánh giá"},
  kv:`Đợt 1: <b>${D.ROUNDS[0].self.pts} — Hạng ${D.ROUNDS[0].self.rank}</b> · chờ Tập đoàn chốt · mục tiêu 2027: <b>95%</b>`},
];

document.getElementById("core-score").innerHTML = vn(D.SCORES.find(s=>s.real).v) + "<small>%</small>";
document.getElementById("core-updated").textContent = "Cập nhật " + D.META.updated;

/* ------- mini donut SVG cho node ------- */
const NR = 24, NL = 2*Math.PI*NR;
function nodeDonut(r, ac){
  return `<svg viewBox="0 0 62 62">
    <circle class="nb" cx="31" cy="31" r="${NR}"/>
    <circle class="nv" cx="31" cy="31" r="${NR}" style="stroke-dasharray:${NL};stroke-dashoffset:${NL*(1-Math.min(100,r.pct)/100)}"/>
    <text x="31" y="32" text-anchor="middle">${r.txt}</text>
    <text class="u" x="31" y="43" text-anchor="middle">${r.unit}</text></svg>`;
}

/* ------- dựng node + liên kết cong + tia chạy (canvas thiết kế cố định) ------- */
const stage = document.getElementById("stage");
const fit = document.getElementById("stagefit");
const svg = document.getElementById("linksvg");
const DW = 1440, NW = 362, CORE = 250;
let DH = 660;
/* 1 thẻ node dùng cho cả chòm sao (desktop) lẫn vòng dọc (mobile/danh sách) */
function makeNode(n, cls){
  const el = document.createElement(n.href ? "a" : "div");
  el.className = "node" + (cls ? " " + cls : "");
  if(n.href) el.href = n.href;
  el.style.setProperty("--ac", n.ac);
  el.innerHTML = `<div class="box">
    <span class="ph">${n.ph} · ${n.verb}<span class="tier">${n.tier}</span></span>
    <div class="nm">${n.nm}</div>
    <div class="ndonut">${nodeDonut(n.ring, n.ac)}</div>
    <div class="kv">${n.kv}</div>
    <span class="go ${n.href?'':'off'}">${n.href ? "Mở phân hệ" : "Sẽ kết nối hệ thống riêng"}</span></div>`;
  return el;
}
const els = NODES.map(n=>{ const el = makeNode(n); fit.appendChild(el); return el; });
let placedH = 0;                       /* chiều cao thẻ tại lần xếp gần nhất */
function place(){
  /* đo chiều cao node thật (chữ xuống dòng tùy nội dung + font đã tải) */
  const maxH = Math.max(...els.map(e=>e.offsetHeight));
  if(!maxH) return;                    /* stage đang ẩn (mobile) — xếp lại khi hiện lại */
  placedH = maxH;
  const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const halfH = maxH/2;
  /* bán kính ellipse: node trên/dưới không chạm lõi, không tràn canvas */
  const ry = CORE/2 + halfH + 12;
  DH = Math.ceil(2*(ry + halfH) + 16);
  const cx = DW/2, cy = DH/2, rx = DW/2 - NW/2 - 16;
  fit.style.height = DH+"px";
  svg.setAttribute("viewBox", `0 0 ${DW} ${DH}`);
  svg.querySelectorAll("path,circle").forEach(e=>e.remove());
  els.forEach((el,i)=>{
    const ang = (-90 + i*72) * Math.PI/180;
    const x = cx + rx*Math.cos(ang), y = cy + ry*Math.sin(ang);
    el.style.left = x+"px"; el.style.top = y+"px";
    /* liên kết cong: quadratic qua điểm lệch vuông góc */
    const mx = (cx+x)/2, my = (cy+y)/2;
    const dx = x-cx, dy = y-cy, len = Math.hypot(dx,dy)||1;
    const qx = mx - dy/len*46, qy = my + dx/len*46;
    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("class","link");
    p.setAttribute("d",`M ${cx} ${cy} Q ${qx} ${qy} ${x} ${y}`);
    p.style.animationDelay = (i*0.7)+"s";
    svg.appendChild(p);
    if(!reduced){
      const dot = document.createElementNS("http://www.w3.org/2000/svg","circle");
      dot.setAttribute("class","spark"); dot.setAttribute("r","3.2");
      const mo = document.createElementNS("http://www.w3.org/2000/svg","animateMotion");
      mo.setAttribute("dur", (5.5 + i*0.6) + "s");
      mo.setAttribute("repeatCount","indefinite");
      mo.setAttribute("path", `M ${cx} ${cy} Q ${qx} ${qy} ${x} ${y}`);
      dot.appendChild(mo); svg.appendChild(dot);
    }
  });
}
function fitScale(){
  if(!stage.clientWidth || !stage.clientHeight) return;   /* stage đang ẩn */
  const k = Math.min(1, stage.clientWidth/DW, stage.clientHeight/DH);
  fit.style.setProperty("--k", k>0 ? k.toFixed(4) : 1);
}
/* xếp lại khi thẻ đổi chiều cao thật: font vừa tải xong, hoặc stage vừa hiện lại
   sau khi bị ẩn ở mobile (<981px) — lúc ẩn mọi phép đo đều bằng 0 */
function refresh(){
  const maxH = Math.max(...els.map(e=>e.offsetHeight));
  if(maxH && maxH !== placedH) place();
  fitScale();
}
refresh();
if(document.fonts && document.fonts.ready) document.fonts.ready.then(refresh);
addEventListener("resize", refresh, {passive:true});
if(window.ResizeObserver) new ResizeObserver(refresh).observe(stage);

/* ------- money row ------- */
document.getElementById("moneyrow").innerHTML = `
  <div class="mr"><div class="v">${vn(st.avg)}%</div><div class="l">Tiến độ KH 1017</div></div>
  <div class="mr"><div class="v red">${st.red}</div><div class="l">Quá hạn</div></div>
  <div class="mr"><div class="v amber">${st.amber}</div><div class="l">Nguy cơ chậm</div></div>
  <div class="mr"><div class="v ok">${st.done}</div><div class="l">Hoàn thành</div></div>
  <div class="mr"><div class="v gold">${st.decide}</div><div class="l">Việc cần HĐTV quyết</div></div>`;

/* ------- vòng dọc (mobile + chế độ Danh sách): dùng lại đúng thẻ của chòm sao ------- */
(function(){
  const box = document.getElementById("menulist");
  box.innerHTML = `<h2>Vòng quản trị · 5 phân hệ</h2>
    <div class="mcore">
      <img src="assets/pvep-logo.png" alt="">
      <div>
        <div class="mv">${vn(D.SCORES.find(s=>s.real).v)}<small>%</small></div>
        <div class="ml">ACGS 2026 · Hạng A</div>
        <div class="mu">Cập nhật ${D.META.updated}</div>
      </div>
    </div>`;
  NODES.forEach(n=>{
    box.insertAdjacentHTML("beforeend", `<div class="conn"></div>`);
    box.appendChild(makeNode(n, "mob"));
  });
  box.insertAdjacentHTML("beforeend", `<div class="conn loop"></div>`);
})();
document.getElementById("togglelist").addEventListener("click", ()=>{
  document.body.classList.toggle("showlist");
  document.getElementById("togglelist").textContent = document.body.classList.contains("showlist") ? "✦ Chòm sao" : "☰ Danh sách";
});

/* ------- slideshow nền (tôn trọng reduced-motion & tab ẩn) ------- */
(function(){
  const imgs = [...document.querySelectorAll(".cinema img")];
  if(matchMedia("(prefers-reduced-motion: reduce)").matches || imgs.length < 2) return;
  let cur = 0;
  setInterval(()=>{
    if(document.hidden) return;
    cur = (cur+1) % imgs.length;
    imgs.forEach((im,j)=>im.classList.toggle("on", j===cur));
  }, 5600);
})();
</script>
